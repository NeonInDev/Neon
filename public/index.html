<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--card:#12121a;--border:#1e1e30;--text:#c0c0d0;--dim:#606080;--neon:#6c5ce7;--neon2:#00cec9;--danger:#ff4757;--success:#00d68f;--warn:#fdcb6e}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{background:var(--card);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:16px;flex-shrink:0}
header h1{font-size:18px;font-weight:700;background:linear-gradient(135deg,var(--neon),var(--neon2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.status-dot{width:10px;height:10px;border-radius:50%;background:var(--success);display:inline-block}
.status-dot.offline{background:var(--danger)}
.tabs{display:flex;gap:4px;margin-left:auto}
.tab{padding:6px 16px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--dim);background:transparent;border:none;transition:.2s}
.tab:hover{color:var(--text);background:var(--border)}
.tab.active{color:#fff;background:linear-gradient(135deg,var(--neon),var(--neon2))}
main{flex:1;display:flex;overflow:hidden}
.panel{display:none;flex:1;padding:20px;overflow-y:auto}
.panel.active{display:block}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:16px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;position:relative;overflow:hidden}
.stat-card .label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--dim);margin-bottom:4px}
.stat-card .value{font-size:28px;font-weight:700;color:#fff}
.stat-card .bar{height:4px;border-radius:2px;margin-top:8px;background:var(--border);overflow:hidden}
.stat-card .bar-fill{height:100%;border-radius:2px;transition:width .5s;background:linear-gradient(90deg,var(--neon),var(--neon2))}
.stat-card .bar-fill.warn{background:linear-gradient(90deg,var(--warn),#e17055)}
.stat-card .bar-fill.danger{background:linear-gradient(90deg,var(--danger),#e17055)}
.chart-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px}
.chart-wrap h3{font-size:13px;color:var(--dim);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.chart-wrap canvas{width:100% !important;height:120px !important}
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.quick-actions{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.quick-btn{background:var(--card);border:1px solid var(--border);color:var(--text);padding:8px 16px;border-radius:8px;cursor:pointer;font-size:12px;transition:.2s}
.quick-btn:hover{background:var(--border);border-color:var(--neon)}
.quick-btn.add{color:var(--neon2);border-style:dashed}
.chat-container{display:flex;flex-direction:column;height:100%;max-width:800px;margin:0 auto;width:100%}
.chat-messages{flex:1;overflow-y:auto;padding:12px 0;display:flex;flex-direction:column;gap:8px}
.msg{padding:10px 14px;border-radius:12px;max-width:85%;line-height:1.5;font-size:14px;animation:fadeIn .2s}
.msg.user{background:linear-gradient(135deg,var(--neon),var(--neon2));color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.msg.neon{background:var(--card);border:1px solid var(--border);align-self:flex-start;border-bottom-left-radius:4px}
.msg.neon .typing{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--dim);animation:blink 1s infinite}
.msg img{max-width:100%;border-radius:8px;margin-top:8px}
.msg pre{background:#0003;padding:8px;border-radius:6px;overflow-x:auto;font-size:12px;margin-top:6px}
.chat-input{display:flex;gap:8px;padding:8px 0;flex-shrink:0}
.chat-input input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:#fff;font-size:14px;outline:none}
.chat-input input:focus{border-color:var(--neon)}
.chat-input button{background:linear-gradient(135deg,var(--neon),var(--neon2));border:none;border-radius:8px;padding:10px 18px;color:#fff;cursor:pointer;font-weight:600;transition:.2s}
.chat-input button:hover{opacity:.85}
.log-toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.log-toolbar input{flex:1;min-width:150px;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:#fff;font-size:13px;outline:none}
.log-toolbar input:focus{border-color:var(--neon)}
.log-toolbar select{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-size:13px;outline:none}
.log-container{font-family:'Cascadia Code','Fira Code',monospace;font-size:12px}
.log-entry{padding:4px 8px;border-radius:4px;color:var(--dim);border-bottom:1px solid var(--border);transition:.15s}
.log-entry:hover{background:var(--card)}
.log-entry .time{color:var(--neon2);margin-right:8px}
.log-entry.ERROR{color:var(--danger);border-left:2px solid var(--danger)}
.log-entry.WARN{color:var(--warn);border-left:2px solid var(--warn)}
.log-entry.INFO{color:var(--text)}
.log-empty{padding:40px;text-align:center;color:var(--dim);font-size:14px}
.time-label{font-size:11px;color:var(--dim);text-align:center;margin:4px 0}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,100%{opacity:.3}50%{opacity:1}}
@media(max-width:640px){
  header{padding:10px 12px;gap:10px}
  header h1{font-size:15px}
  .tab{padding:5px 10px;font-size:12px}
  .panel{padding:12px}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .stat-card .value{font-size:22px}
  .chart-row{grid-template-columns:1fr}
  .chart-wrap canvas{height:100px !important}
}
@media(max-width:400px){
  .stats-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<header>
  <span class="status-dot" id="statusDot"></span>
  <h1>Neon</h1>
  <div class="tabs">
    <button class="tab active" data-tab="dashboard">Status</button>
    <button class="tab" data-tab="chat">Chat</button>
    <button class="tab" data-tab="logs">Logs</button>
  </div>
</header>
<main>

<!-- Dashboard -->
<div class="panel active" id="panel-dashboard">
  <div class="stats-grid" id="statsGrid">
    <div class="stat-card"><div class="label">CPU</div><div class="value" id="cpuVal">--</div><div class="bar"><div class="bar-fill" id="cpuBar" style="width:0%"></div></div></div>
    <div class="stat-card"><div class="label">RAM</div><div class="value" id="ramVal">--</div><div class="bar"><div class="bar-fill" id="ramBar" style="width:0%"></div></div></div>
    <div class="stat-card"><div class="label">Disco C:</div><div class="value" id="diskVal">--</div><div class="bar"><div class="bar-fill" id="diskBar" style="width:0%"></div></div></div>
    <div class="stat-card"><div class="label">Temperatura</div><div class="value" id="tempVal">--</div></div>
  </div>

  <div class="chart-row">
    <div class="chart-wrap"><h3>CPU</h3><canvas id="chartCpu" height="120"></canvas></div>
    <div class="chart-wrap"><h3>RAM</h3><canvas id="chartRam" height="120"></canvas></div>
  </div>

  <div class="quick-actions" id="quickActions">
    <button class="quick-btn" data-cmd="Neon, status do PC">Status PC</button>
    <button class="quick-btn" data-cmd="Neon, clima">Clima</button>
    <button class="quick-btn" data-cmd="Neon, noticias">Noticias</button>
    <button class="quick-btn" data-cmd="Neon, toca uma musica">Musica</button>
    <button class="quick-btn" data-cmd="Neon, print">Screenshot</button>
    <button class="quick-btn" data-cmd="__voice">Voz</button>
    <button class="quick-btn add" id="addQuickAction">+</button>
  </div>
</div>

<!-- Chat -->
<div class="panel" id="panel-chat">
  <div class="chat-container">
    <div class="chat-messages" id="chatMessages">
      <div class="msg neon">Neon online. Como posso ajudar?</div>
    </div>
    <form class="chat-input" onsubmit="return sendChat(event)">
      <input type="text" id="chatInput" placeholder="Comando..." autofocus>
      <button type="button" id="listenBtn" onclick="toggleListen()" title="Falar" style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--dim);cursor:pointer;font-size:16px">🎤</button>
      <button type="submit">Enviar</button>
    </form>
  </div>
</div>

<!-- Logs -->
<div class="panel" id="panel-logs">
  <div class="log-toolbar">
    <input type="text" id="logFilter" placeholder="Filtrar logs..." oninput="renderLogs()">
    <select id="logLevel" onchange="renderLogs()">
      <option value="">Todos</option>
      <option value="INFO">INFO</option>
      <option value="WARN">WARN</option>
      <option value="ERROR">ERROR</option>
    </select>
  </div>
  <div class="log-container" id="logContainer"></div>
</div>

</main>
<script>
const OWNER_ID = "1442928336329379925"
let voiceOn = false
let allLogs = []
let historyCpu = [], historyRam = [], historyDisk = [], historyLabels = []
const MAX_HISTORY = 60
let listening = false
let recognition = null
if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition
  recognition = new SR()
  recognition.lang = 'pt-BR'
  recognition.continuous = false
  recognition.interimResults = false
  recognition.onresult = (e) => {
    const text = e.results[e.results.length-1][0].transcript
    toggleListenBtn(false)
    send(text)
  }
  recognition.onerror = () => toggleListenBtn(false)
  recognition.onend = () => toggleListenBtn(false)
}

// Tabs
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'))
    tab.classList.add('active')
    document.getElementById('panel-' + tab.dataset.tab).classList.add('active')
    if (tab.dataset.tab === 'logs') { loadLogs(); renderLogs() }
  })
})

async function fetchAPI(url, body) {
  try {
    const opts = body ? { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) } : {}
    const r = await fetch(url, opts)
    return await r.json()
  } catch { return null }
}

// === Status ===
async function updateStatus() {
  const data = await fetchAPI('/api/status')
  if (!data || data.erro) { document.getElementById('statusDot').classList.add('offline'); return }
  document.getElementById('statusDot').classList.remove('offline')
  const cpu = data.cpuUso, ram = data.ramUso, disk = data.discoUso, temp = data.temperatura
  setStat('cpuVal', cpu != null ? cpu+'%' : 'N/A', 'cpuBar', cpu)
  setStat('ramVal', ram != null ? ram+'%' : 'N/A', 'ramBar', ram)
  setStat('diskVal', disk != null ? disk+'%' : 'N/A', 'diskBar', disk)
  document.getElementById('tempVal').textContent = temp != null ? temp+'°C' : 'N/A'

  const now = new Date().toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' })
  historyLabels.push(now); historyCpu.push(cpu ?? 0); historyRam.push(ram ?? 0); historyDisk.push(disk ?? 0)
  if (historyLabels.length > MAX_HISTORY) { historyLabels.shift(); historyCpu.shift(); historyRam.shift(); historyDisk.shift() }
  drawChart('chartCpu', historyCpu, '#6c5ce7', '#00cec9')
  drawChart('chartRam', historyRam, '#00cec9', '#6c5ce7')
}
function setStat(valId, text, barId, pct) {
  document.getElementById(valId).textContent = text
  if (pct != null) {
    const bar = document.getElementById(barId)
    bar.style.width = Math.min(pct, 100)+'%'
    bar.classList.toggle('warn', pct > 70)
    bar.classList.toggle('danger', pct > 90)
  }
}
function drawChart(canvasId, data, col1, col2) {
  const c = document.getElementById(canvasId)
  if (!c || !data.length) return
  const ctx = c.getContext('2d'), w = c.offsetWidth || 300, h = c.offsetHeight || 120
  c.width = w * devicePixelRatio; c.height = h * devicePixelRatio
  ctx.scale(devicePixelRatio, devicePixelRatio)
  ctx.clearRect(0, 0, w, h)
  if (data.length < 2) return
  const max = Math.max(...data, 100), pad = 8, gW = w - pad*2, gH = h - pad*2
  const pts = data.map((v,i) => ({ x: pad + (i/(data.length-1))*gW, y: pad + gH - (v/max)*gH }))
  const grad = ctx.createLinearGradient(0, pad, 0, pad+gH)
  grad.addColorStop(0, col1+'40'); grad.addColorStop(1, col1+'05')
  ctx.beginPath(); ctx.moveTo(pts[0].x, pad+gH)
  pts.forEach(p => ctx.lineTo(p.x, p.y)); ctx.lineTo(pts[pts.length-1].x, pad+gH)
  ctx.closePath(); ctx.fillStyle = grad; ctx.fill()
  ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y)
  pts.forEach(p => ctx.lineTo(p.x, p.y))
  ctx.strokeStyle = col1; ctx.lineWidth = 2; ctx.stroke()
  const last = pts[pts.length-1], val = data[data.length-1]
  ctx.beginPath(); ctx.arc(last.x, last.y, 3, 0, Math.PI*2)
  ctx.fillStyle = col2; ctx.fill()
  ctx.font = '10px sans-serif'; ctx.fillStyle = col2; ctx.textAlign = 'center'
  ctx.fillText(Math.round(val)+'%', last.x, last.y-8)
}

// === Quick Actions ===
const defaultQuickActions = [
  'Neon, status do PC', 'Neon, clima', 'Neon, noticias',
  'Neon, toca uma musica', 'Neon, print', '__voice'
]
function renderQuickActions() {
  const cmds = JSON.parse(localStorage.getItem('neon_quickActions') || '[]')
  const list = cmds.length ? cmds : defaultQuickActions
  const container = document.getElementById('quickActions')
  container.innerHTML = ''
  list.forEach(cmd => {
    const btn = document.createElement('button')
    btn.className = 'quick-btn'
    if (cmd === '__voice') { btn.textContent = 'Voz'; btn.onclick = toggleVoice; return container.insertBefore(btn, container.lastElementChild) }
    btn.textContent = cmd.replace(/^Neon,\s*/i, '').charAt(0).toUpperCase() + cmd.replace(/^Neon,\s*/i, '').slice(1)
    btn.dataset.cmd = cmd
    btn.onclick = () => send(cmd)
    btn.oncontextmenu = (e) => { e.preventDefault(); removeQuickAction(cmd) }
    container.insertBefore(btn, container.lastElementChild)
  })
}
function removeQuickAction(cmd) {
  const cmds = JSON.parse(localStorage.getItem('neon_quickActions') || '[]')
  if (!cmds.length) return
  const idx = cmds.indexOf(cmd); if (idx >= 0) cmds.splice(idx, 1)
  localStorage.setItem('neon_quickActions', JSON.stringify(cmds))
  renderQuickActions()
}
document.getElementById('addQuickAction').addEventListener('click', () => {
  const cmd = prompt('Comando rapido (ex: Neon, clima):')
  if (!cmd) return
  const cmds = JSON.parse(localStorage.getItem('neon_quickActions') || '[]')
  if (!cmds.includes(cmd)) cmds.push(cmd)
  localStorage.setItem('neon_quickActions', JSON.stringify(cmds))
  renderQuickActions()
})

// === Chat ===
async function send(msg) {
  const tabChat = document.querySelector('[data-tab="chat"]')
  tabChat.click()
  addMsg(msg, 'user')
  addMsg('', 'neon typing')
  const data = await fetchAPI('/api/ask', { userId:OWNER_ID, username:'Dono', message:msg })
  removeTyping()
  if (data) { addMsg(data.reply || '(sem resposta)', 'neon'); speak(data.reply || '') }
  else addMsg('Erro ao contactar Neon', 'neon')
}
function sendChat(e) {
  e.preventDefault()
  const input = document.getElementById('chatInput')
  const msg = input.value.trim()
  if (!msg) return false
  input.value = ''
  send(msg)
  return false
}
function addMsg(text, cls) {
  const c = document.getElementById('chatMessages')
  const d = document.createElement('div')
  d.className = 'msg ' + cls
  if (cls.includes('typing')) d.innerHTML = '<span class="typing"></span><span class="typing"></span><span class="typing"></span>'
  else if (text.includes('http') && (text.includes('giphy') || text.includes('gif') || text.endsWith('.gif'))) {
    d.textContent = text.replace(/https?:\/\/\S+/g, '').trim()
    const url = text.match(/https?:\/\/\S+/)
    if (url) { const img = document.createElement('img'); img.src = url[0]; img.onerror = ()=>img.remove(); d.appendChild(img) }
  } else d.textContent = text
  c.appendChild(d)
  c.scrollTop = c.scrollHeight
}
function removeTyping() { const t = document.querySelector('.typing'); if (t) t.closest('.msg').remove() }

// === Logs ===
async function loadLogs() {
  const data = await fetchAPI('/api/logs')
  if (data) allLogs = data
}
function renderLogs() {
  const filter = (document.getElementById('logFilter').value || '').toLowerCase()
  const level = document.getElementById('logLevel').value
  let logs = allLogs
  if (level) logs = logs.filter(l => l.level === level)
  if (filter) logs = logs.filter(l => (l.message||'').toLowerCase().includes(filter) || (l.level||'').toLowerCase().includes(filter))
  const c = document.getElementById('logContainer')
  if (!logs.length) { c.innerHTML = '<div class="log-empty">Nenhum log encontrado</div>'; return }
  c.innerHTML = logs.slice(-200).reverse().map(l => {
    const cls = l.level === 'ERROR' ? 'ERROR' : l.level === 'WARN' ? 'WARN' : ''
    return '<div class="log-entry '+cls+'"><span class="time">'+(l.time||'')+'</span>['+(l.level||'')+'] '+(l.message||'')+'</div>'
  }).join('')
}

// === Voice (Web Speech) ===
function toggleListen() { listening ? toggleListenBtn(false) : toggleListenBtn(true) }
function toggleListenBtn(on) {
  listening = on
  const btn = document.getElementById('listenBtn')
  if (btn) { btn.style.borderColor = on ? 'var(--danger)' : 'var(--border)'; btn.style.color = on ? 'var(--danger)' : 'var(--dim)' }
  if (!recognition) return
  if (on) try { recognition.start() } catch {} else try { recognition.stop() } catch {}
}
function speak(text) {
  if (!window.speechSynthesis) return
  window.speechSynthesis.cancel()
  const u = new SpeechSynthesisUtterance(text.replace(/[*_~`]/g, ''))
  u.lang = 'pt-BR'
  u.rate = 1.1
  const voices = window.speechSynthesis.getVoices()
  const pt = voices.find(v => v.lang.startsWith('pt-BR') && v.name.includes('Maria')) || voices.find(v => v.lang.startsWith('pt'))
  if (pt) u.voice = pt
  window.speechSynthesis.speak(u)
}
document.addEventListener('keydown', (e) => {
  if (e.altKey && e.key === 'v') toggleListen()
})

async function toggleVoice() {
  const data = await fetchAPI('/api/voice/toggle', { userId:OWNER_ID })
  voiceOn = data?.ativo || false
}

// === Init ===
renderQuickActions()
updateStatus()
setInterval(updateStatus, 3000)
setInterval(() => { loadLogs(); renderLogs() }, 5000)
document.getElementById('chatInput').focus()
</script>
</body>
</html>
