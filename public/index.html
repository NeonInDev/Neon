<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>◆</text></svg>">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0d0d1a;
    color: #ddd;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    background: #111125;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid #1e1e3a;
    flex-shrink: 0;
  }
  .avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, #00d4ff, #7b2ff7);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700; color: white;
  }
  .info { flex: 1; }
  .info h1 { font-size: 15px; font-weight: 600; color: #eee; }
  .info span { font-size: 12px; color: #666; }
  .status-badge {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: #888;
  }
  .dot-online {
    width: 8px; height: 8px; border-radius: 50%;
    background: #00e676; display: inline-block;
    animation: p 1.5s infinite;
  }
  @keyframes p { 0%,100%{opacity:1} 50%{opacity:.4} }

  #chat {
    flex: 1; overflow-y: auto; padding: 16px 20px;
    display: flex; flex-direction: column; gap: 12px;
    scroll-behavior: smooth;
  }
  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: #1e1e3a; border-radius: 2px; }

  .msg {
    display: flex; gap: 10px;
    max-width: 85%; animation: f .2s ease;
  }
  @keyframes f { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.neon { align-self: flex-start; }
  .msg.system {
    align-self: center; max-width: 100%;
    font-size: 11px; color: #555; text-align: center;
    padding: 4px 0;
  }

  .msg .pic {
    width: 32px; height: 32px; border-radius: 50%;
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600;
  }
  .msg.neon .pic { background: linear-gradient(135deg, #00d4ff, #7b2ff7); color: white; }
  .msg.user .pic { background: #1e1e3a; color: #7b7bb0; border: 1px solid #2a2a5a; }

  .msg .bubble {
    padding: 10px 14px; border-radius: 14px;
    font-size: 14px; line-height: 1.5;
    word-break: break-word;
  }
  .msg.neon .bubble {
    background: #16162e; color: #d0d0f0;
    border-bottom-left-radius: 4px;
    border: 1px solid #1e1e3e;
  }
  .msg.user .bubble {
    background: linear-gradient(135deg, #0044cc, #0055ee);
    color: white; border-bottom-right-radius: 4px;
  }

  .bubble pre {
    background: #0a0a18; border-radius: 8px;
    padding: 10px 12px; margin: 6px 0;
    overflow-x: auto; font-size: 13px;
    border: 1px solid #1a1a34;
  }
  .bubble code { font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 13px; }
  .bubble .hl { color: #00d4ff; font-weight: 600; }
  .bubble .ok { color: #00e676; }
  .bubble .err { color: #ff5252; }
  .bubble .warn { color: #ffc107; }

  .msg .time {
    font-size: 10px; color: #444; margin-top: 4px;
    text-align: right;
  }

  .typing-indicator {
    display: flex; gap: 4px; align-items: center;
    padding: 0 0 0 42px; font-size: 22px; color: #555;
  }
  .typing-indicator span { animation: d 1.4s infinite; }
  .typing-indicator span:nth-child(2) { animation-delay: .2s; }
  .typing-indicator span:nth-child(3) { animation-delay: .4s; }
  @keyframes d { 0%,60%,100%{opacity:.2} 30%{opacity:1} }

  .quick-bar {
    display: flex; gap: 6px; padding: 6px 20px;
    flex-wrap: wrap; flex-shrink: 0;
  }
  .quick-bar button {
    background: #16162e; border: 1px solid #1e1e3e;
    border-radius: 12px; padding: 4px 12px;
    color: #888; font-size: 12px; cursor: pointer;
    transition: all .15s; font-family: inherit;
  }
  .quick-bar button:hover {
    background: #1e1e3e; color: #ddd; border-color: #00d4ff;
  }

  #input-area {
    display: flex; gap: 8px; padding: 10px 20px 16px;
    border-top: 1px solid #111125;
    background: #0a0a16; flex-shrink: 0;
  }
  #input {
    flex: 1; background: #111125; border: 1px solid #1e1e3e;
    border-radius: 10px; padding: 10px 14px;
    color: white; font-size: 14px; outline: none;
    font-family: inherit; transition: border-color .15s;
  }
  #input:focus { border-color: #00d4ff; }
  #input::placeholder { color: #444; }
  #send {
    background: linear-gradient(135deg, #00d4ff, #7b2ff7);
    color: white; border: none; border-radius: 10px;
    padding: 0 20px; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: opacity .15s;
    font-family: inherit;
  }
  #send:disabled { opacity: .4; cursor: default; }

  @media (max-width: 600px) {
    .msg { max-width: 95%; }
    #chat { padding: 12px; }
    #input-area { padding: 10px 12px 14px; }
  }
</style>
</head>
<body>

<header>
  <div class="avatar">◆</div>
  <div class="info">
    <h1>Neon</h1>
    <span>assistente pessoal</span>
  </div>
  <div class="status-badge">
    <span class="dot-online"></span>
    <span id="statusText">online</span>
  </div>
</header>

<div id="chat">
  <div class="msg system">Neon iniciada. Mande uma mensagem pra começar.</div>
</div>

<div class="quick-bar">
  <button onclick="send('status do pc')">🖥 Status</button>
  <button onclick="send('clima em São Paulo')">🌤 Clima</button>
  <button onclick="send('noticias')">📰 Notícias</button>
  <button onclick="send('memorias')">💾 Memórias</button>
  <button onclick="send('horas')">🕐 Hora</button>
  <button onclick="send('cotacao')">💰 Cotação</button>
  <button onclick="send('boa noite')">🌙 Boa Noite</button>
</div>

<div id="input-area">
  <input id="input" placeholder="Digite sua mensagem..." autofocus>
  <button id="send" onclick="send()">Enviar</button>
</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const API = '/api/ask';
let busy = false;
let history = [];
let hIdx = -1;

function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;

  if (role === 'system') {
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return;
  }

  const pic = document.createElement('div');
  pic.className = 'pic';
  pic.textContent = role === 'neon' ? '◆' : 'U';
  div.appendChild(pic);

  const col = document.createElement('div');
  col.style.cssText = 'display:flex;flex-direction:column;gap:2px';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  if (role === 'neon') {
    const html = text
      .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
      .replace(/\*\*(.*?)\*\*/g, '<span class="hl">$1</span>')
      .replace(/✅/g, '<span class="ok">✅</span>')
      .replace(/❌/g, '<span class="err">❌</span>')
      .replace(/⚠️/g, '<span class="warn">⚠️</span>')
      .replace(/\n/g, '<br>');
    bubble.innerHTML = html;
  } else {
    bubble.textContent = text;
  }
  col.appendChild(bubble);

  const t = document.createElement('div');
  t.className = 'time';
  t.textContent = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
  col.appendChild(t);

  div.appendChild(col);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function typing(show) {
  const id = 'typing-el';
  if (!show) { const el = document.getElementById(id); if (el) el.remove(); return; }
  if (document.getElementById(id)) return;
  const div = document.createElement('div');
  div.className = 'msg neon';
  div.id = id;
  const pic = document.createElement('div'); pic.className = 'pic'; pic.textContent = '◆';
  div.appendChild(pic);
  const ind = document.createElement('div');
  ind.className = 'typing-indicator';
  ind.innerHTML = '<span>●</span><span>●</span><span>●</span>';
  div.appendChild(ind);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function send(text) {
  const msg = text || input.value.trim();
  if (!msg || busy) return;
  input.value = '';
  busy = true;
  sendBtn.disabled = true;

  history.push(msg);
  hIdx = -1;

  addMsg('user', msg);
  typing(true);

  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({userId:'web_ui', username:'Web', message:msg})
    });
    const data = await res.json();
    typing(false);
    addMsg('neon', data.reply || (data.error ? '❌ ' + data.error : '⚠ sem resposta'));
  } catch (err) {
    typing(false);
    addMsg('system', '❌ Erro de conexão: ' + err.message);
  }
  busy = false;
  sendBtn.disabled = false;
  input.focus();
}

input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); return; }
  if (e.key === 'ArrowUp' && history.length) {
    e.preventDefault();
    hIdx = Math.min(hIdx + 1, history.length - 1);
    input.value = history[history.length - 1 - hIdx];
  }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (hIdx <= 0) { hIdx = -1; input.value = ''; return; }
    hIdx--;
    input.value = history[history.length - 1 - hIdx];
  }
});
</script>
</body>
</html>
