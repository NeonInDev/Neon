<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>◆</text></svg>">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0a0a14;
    color: #ddd;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    background: linear-gradient(90deg, #0d0d20, #151530, #0d0d20);
    padding: 14px 20px;
    display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid #1a1a3e;
    flex-shrink: 0;
    position: relative;
  }
  header::after {
    content: '';
    position: absolute; bottom: -1px; left: 20%; right: 20%;
    height: 1px;
    background: linear-gradient(90deg, transparent, #00d4ff44, #7b2ff744, transparent);
  }
  .avatar {
    width: 38px; height: 38px; border-radius: 50%;
    background: linear-gradient(135deg, #00d4ff, #7b2ff7);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700; color: white;
    box-shadow: 0 0 12px #7b2ff744;
  }
  .info { flex: 1; }
  .info h1 {
    font-size: 15px; font-weight: 600;
    background: linear-gradient(90deg, #00d4ff, #7b2ff7);
    -webkit-text-fill-color: transparent;
    -webkit-background-clip: text;
    background-clip: text;
  }
  .info .tagline {
    font-size: 11px; color: #555;
    font-style: italic;
    animation: tagline 10s infinite;
  }
  @keyframes tagline {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }
  .status {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: #555;
  }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #00e676; display: inline-block;
    box-shadow: 0 0 6px #00e67666;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  #chat {
    flex: 1; overflow-y: auto; padding: 20px;
    display: flex; flex-direction: column; gap: 16px;
    scroll-behavior: smooth;
    background: radial-gradient(ellipse at 50% 0%, #0d0d20, #080810);
  }
  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: #1a1a3e; border-radius: 2px; }

  .splash {
    text-align: center; padding: 60px 20px 40px;
    color: #333; user-select: none;
  }
  .splash .icon {
    font-size: 48px; margin-bottom: 16px;
    background: linear-gradient(135deg, #00d4ff, #7b2ff7);
    -webkit-text-fill-color: transparent;
    -webkit-background-clip: text;
    background-clip: text;
  }
  .splash p { font-size: 13px; line-height: 1.8; color: #444; }

  .msg { display: flex; gap: 10px; max-width: 88%; animation: f .2s ease; }
  @keyframes f { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.neon { align-self: flex-start; }
  .msg.system { align-self: center; font-size: 11px; color: #444; max-width: 100%; padding: 4px 0; }

  .pic {
    width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
  }
  .neon .pic {
    background: linear-gradient(135deg, #00d4ff22, #7b2ff722);
    border: 1px solid #2a2a5e;
    color: #7b2ff7;
  }
  .user .pic {
    background: #111130; border: 1px solid #2a2a5e;
    color: #666; font-size: 11px;
  }

  .bubble {
    padding: 10px 14px; border-radius: 14px;
    font-size: 14px; line-height: 1.5; word-break: break-word;
  }
  .neon .bubble {
    background: #12122a; color: #ccccee;
    border-bottom-left-radius: 4px;
    border: 1px solid #1a1a3e;
  }
  .user .bubble {
    background: linear-gradient(135deg, #0022aa, #0033cc);
    color: white; border-bottom-right-radius: 4px;
  }

  .bubble code { font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 13px; }
  .bubble pre {
    background: #0a0a18; border-radius: 8px; padding: 10px 12px;
    margin: 6px 0; overflow-x: auto; font-size: 13px;
    border: 1px solid #1a1a34;
  }
  .bubble .hl { color: #00d4ff; font-weight: 600; }
  .bubble .ok { color: #00e676; }
  .bubble .err { color: #ff5252; }
  .bubble .warn { color: #ffc107; }

  .time { font-size: 10px; color: #333; margin-top: 4px; text-align: right; }

  .typing {
    display: flex; gap: 4px; align-items: center;
    padding: 0 0 0 40px; font-size: 20px;
    animation: f .2s ease;
  }
  .typing span { animation: d 1.4s infinite; color: #5a5a8a; }
  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes d { 0%,60%,100%{opacity:.15} 30%{opacity:1} }

  .quick-bar {
    display: flex; gap: 6px; padding: 4px 20px;
    flex-wrap: wrap; flex-shrink: 0;
    justify-content: center;
  }
  .quick-bar button {
    background: #111128; border: 1px solid #1a1a3e;
    border-radius: 10px; padding: 5px 10px;
    color: #666; font-size: 11px; cursor: pointer;
    transition: all .15s; font-family: inherit;
  }
  .quick-bar button:hover {
    background: #1a1a3e; color: #aaa; border-color: #00d4ff44;
  }

  #input-area {
    display: flex; gap: 8px; padding: 10px 20px 14px;
    border-top: 1px solid #0d0d1e;
    background: #080810; flex-shrink: 0;
  }
  #input {
    flex: 1; background: #111128; border: 1px solid #1a1a3e;
    border-radius: 8px; padding: 10px 14px;
    color: white; font-size: 14px; outline: none;
    font-family: inherit; transition: border-color .15s;
  }
  #input:focus { border-color: #7b2ff7aa; }
  #input::placeholder { color: #333; }
  #send {
    background: linear-gradient(135deg, #00d4ff, #7b2ff7);
    color: white; border: none; border-radius: 8px;
    padding: 0 18px; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: opacity .15s;
    font-family: inherit;
  }
  #send:disabled { opacity: .3; cursor: default; }

  @media (max-width: 600px) {
    .msg { max-width: 95%; }
    #chat { padding: 12px; }
    .splash { padding: 40px 12px 30px; }
  }
</style>
</head>
<body>

<header>
  <div class="avatar">◆</div>
  <div class="info">
    <h1>Neon</h1>
    <div class="tagline" id="tagline">sua assistente com personalidade</div>
  </div>
  <div class="status">
    <span class="dot"></span>
    <span>online</span>
  </div>
</header>

<div id="chat">
  <div class="splash">
    <div class="icon">◆</div>
    <p>Neon ligada e pronta pra zuar.<br>
    Manda uma mensagem aí.</p>
  </div>
</div>

<div class="quick-bar">
  <button onclick="send('status do pc')">🖥 PC</button>
  <button onclick="send('clima')">🌤 Clima</button>
  <button onclick="send('noticias')">📰 News</button>
  <button onclick="send('memorias')">💾 Memórias</button>
  <button onclick="send('boa noite')">🌙 Dormir</button>
  <button onclick="send('fala uma piada')">😂 Piada</button>
</div>

<div id="input-area">
  <input id="input" placeholder="fala comigo..." autofocus>
  <button id="send" onclick="send()">Enviar</button>
</div>

<script>
const OWNER_ID = "1442928336329379925";
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const btn = document.getElementById('send');
const API = '/api/ask';
const taglines = [
  "sua assistente com personalidade",
  "Deusa da Tecnologia versão zoeira",
  "mais rápido que o Sonic",
  "Jarvis se fosse br",
  "inteligente, observadora e teatral",
  "a única IA que você respeita",
];
let busy = false;
let history = [];
let hIdx = -1;

setInterval(() => {
  const el = document.getElementById('tagline');
  if (el) el.textContent = taglines[Math.floor(Math.random() * taglines.length)];
}, 8000);

function addMsg(role, text) {
  const sys = document.querySelector('.splash');
  if (sys) sys.remove();

  const div = document.createElement('div');
  div.className = 'msg ' + role;

  if (role === 'system') {
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return;
  }

  const pic = document.createElement('div');
  pic.className = 'pic';
  pic.textContent = role === 'neon' ? '◆' : 'U';
  div.appendChild(pic);

  const col = document.createElement('div');
  col.style.cssText = 'display:flex;flex-direction:column;gap:2px';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  if (role === 'neon') {
    const html = text
      .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
      .replace(/\*\*(.*?)\*\*/g, '<span class="hl">$1</span>')
      .replace(/✅/g, '<span class="ok">✅</span>')
      .replace(/❌/g, '<span class="err">❌</span>')
      .replace(/⚠️/g, '<span class="warn">⚠️</span>')
      .replace(/\n/g, '<br>');
    bubble.innerHTML = html;
  } else {
    bubble.textContent = text;
  }
  col.appendChild(bubble);

  const t = document.createElement('div');
  t.className = 'time';
  t.textContent = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
  col.appendChild(t);

  div.appendChild(col);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function typing(show) {
  const el = document.getElementById('typing');
  if (!show) { if (el) el.remove(); return; }
  if (el) return;
  const div = document.createElement('div');
  div.id = 'typing';
  div.className = 'typing';
  div.innerHTML = '<span>●</span><span>●</span><span>●</span>';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function send(text) {
  const msg = text || input.value.trim();
  if (!msg || busy) return;
  input.value = '';
  busy = true;
  btn.disabled = true;

  history.push(msg);
  hIdx = -1;

  addMsg('user', msg);
  typing(true);

  const start = Date.now();

  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({userId: OWNER_ID, username: 'Dono', message: msg})
    });
    const data = await res.json();
    typing(false);
    const elapsed = ((Date.now() - start) / 1000).toFixed(1);
    const reply = data.reply || (data.error ? '❌ ' + data.error : '⚠ sem resposta');
    addMsg('neon', reply + `\n_(${elapsed}s)_`);
  } catch (err) {
    typing(false);
    addMsg('system', '❌ erro de conexão: ' + err.message);
  }
  busy = false;
  btn.disabled = false;
  input.focus();
}

input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); return; }
  if (e.key === 'ArrowUp' && history.length) {
    e.preventDefault();
    hIdx = Math.min(hIdx + 1, history.length - 1);
    input.value = history[history.length - 1 - hIdx];
  }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (hIdx <= 0) { hIdx = -1; input.value = ''; return; }
    hIdx--;
    input.value = history[history.length - 1 - hIdx];
  }
});
</script>
</body>
</html>
