<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Interface</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💠</text></svg>">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #0a0a1a;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  header {
    background: linear-gradient(135deg, #0f0f2e, #1a1a3e);
    padding: 16px 24px;
    border-bottom: 1px solid #2a2a5e;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }
  header h1 {
    font-size: 20px;
    font-weight: 600;
    background: linear-gradient(90deg, #00d4ff, #7b2ff7);
    -webkit-text-fill-color: transparent;
    -webkit-background-clip: text;
    background-clip: text;
  }
  header .status {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: #888;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #00ff88;
    display: inline-block;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 16px 24px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    scroll-behavior: smooth;
  }
  .msg {
    max-width: 80%;
    padding: 10px 16px;
    border-radius: 12px;
    line-height: 1.5;
    font-size: 14px;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user {
    align-self: flex-end;
    background: linear-gradient(135deg, #1a5bbf, #2d7de5);
    color: white;
    border-bottom-right-radius: 4px;
  }
  .msg.neon {
    align-self: flex-start;
    background: #1a1a3e;
    color: #d0d0ff;
    border: 1px solid #2a2a5e;
    border-bottom-left-radius: 4px;
  }
  .msg.neon .time {
    font-size: 11px;
    color: #666;
    margin-top: 4px;
    display: block;
  }
  .msg.system {
    align-self: center;
    background: transparent;
    color: #666;
    font-size: 12px;
    font-style: italic;
    border: none;
    padding: 4px 16px;
  }
  .typing {
    align-self: flex-start;
    color: #888;
    font-size: 13px;
    padding: 8px 16px;
    display: flex;
    gap: 4px;
  }
  .typing span {
    animation: dotPulse 1.4s infinite;
    font-size: 20px;
    line-height: 1;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotPulse { 0%, 60%, 100% { opacity: 0.3; } 30% { opacity: 1; } }
  #input-area {
    border-top: 1px solid #1a1a3e;
    padding: 12px 24px;
    display: flex;
    gap: 12px;
    background: #0d0d20;
    flex-shrink: 0;
  }
  #input {
    flex: 1;
    background: #1a1a3e;
    border: 1px solid #2a2a5e;
    border-radius: 8px;
    padding: 10px 16px;
    color: white;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  #input:focus { border-color: #00d4ff; }
  #input::placeholder { color: #555; }
  #send {
    background: linear-gradient(135deg, #00d4ff, #7b2ff7);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
  }
  #send:active { transform: scale(0.96); }
  #send:disabled { opacity: 0.5; cursor: not-allowed; }
  .quick-actions {
    display: flex;
    gap: 8px;
    padding: 8px 24px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .quick-btn {
    background: #1a1a3e;
    border: 1px solid #2a2a5e;
    border-radius: 16px;
    padding: 4px 14px;
    color: #aaa;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .quick-btn:hover { background: #2a2a5e; color: white; border-color: #00d4ff; }
  pre { background: #0d0d1a; padding: 8px; border-radius: 6px; overflow-x: auto; font-size: 13px; margin: 4px 0; }
  code { font-family: 'Cascadia Code', 'Fira Code', monospace; }
  @media (max-width: 600px) {
    .msg { max-width: 95%; }
    #chat { padding: 12px; }
    #input-area { padding: 12px; }
  }
</style>
</head>
<body>

<header>
  <h1>◆ NEON</h1>
  <span style="font-size:13px;color:#666">assistente pessoal</span>
  <div class="status">
    <span class="status-dot"></span>
    <span id="statusText">online</span>
  </div>
</header>

<div id="chat">
  <div class="msg system">◆ Neon iniciado. Use /help para comandos, ou apenas converse.</div>
</div>

<div class="quick-actions">
  <button class="quick-btn" onclick="enviar('status do pc')">🖥 Status PC</button>
  <button class="quick-btn" onclick="enviar('clima em São Paulo')">🌤 Clima</button>
  <button class="quick-btn" onclick="enviar('noticias')">📰 Notícias</button>
  <button class="quick-btn" onclick="enviar('memorias')">💾 Memórias</button>
  <button class="quick-btn" onclick="enviar('horas')">🕐 Hora</button>
  <button class="quick-btn" onclick="enviar('cotacao')">💰 Cotação</button>
</div>

<div id="input-area">
  <input id="input" type="text" placeholder="Digite sua mensagem..." autofocus>
  <button id="send" onclick="enviar()">Enviar</button>
</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const API = '/api/ask';
let enviando = false;

function adicionarMsg(texto, tipo) {
  const div = document.createElement('div');
  div.className = 'msg ' + tipo;
  if (tipo === 'neon') {
    const conteudo = texto.replace(/\`\`\`(\w*)\n([\s\S]*?)\`\`\`/g, '<pre><code>$2</code></pre>');
    const p = document.createElement('div');
    p.innerHTML = conteudo.replace(/\n/g, '<br>');
    div.appendChild(p);
    const time = document.createElement('span');
    time.className = 'time';
    time.textContent = new Date().toLocaleTimeString('pt-BR');
    div.appendChild(time);
  } else {
    div.textContent = texto;
  }
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function mostrarTyping() {
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typing-indicator';
  div.innerHTML = '<span>●</span><span>●</span><span>●</span>';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removerTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

async function enviar(texto) {
  if (enviando) return;
  const msg = texto || input.value.trim();
  if (!msg) return;
  input.value = '';
  enviando = true;
  sendBtn.disabled = true;

  adicionarMsg(msg, 'user');
  mostrarTyping();

  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        userId: 'web_local',
        username: 'Web',
        message: msg
      })
    });
    const data = await res.json();
    removerTyping();
    if (data.reply) {
      adicionarMsg(data.reply, 'neon');
    } else if (data.error) {
      adicionarMsg('❌ ' + data.error, 'system');
    } else {
      adicionarMsg('❌ Resposta vazia', 'system');
    }
  } catch (err) {
    removerTyping();
    adicionarMsg('❌ Erro de conexão: ' + err.message, 'system');
  }
  enviando = false;
  sendBtn.disabled = false;
  input.focus();
}

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    enviar();
  }
});
</script>
</body>
</html>
