<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Interface</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>◆</text></svg>">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    background: #080818;
    color: #c0c0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    background: linear-gradient(90deg, #0a0a1e, #12122a, #0a0a1e);
    padding: 12px 24px;
    border-bottom: 1px solid #1a1a3e;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }
  header .logo {
    font-size: 18px;
    font-weight: 700;
    background: linear-gradient(135deg, #00d4ff, #7b2ff7);
    -webkit-text-fill-color: transparent;
    -webkit-background-clip: text;
    background-clip: text;
    letter-spacing: 2px;
  }
  header .sub {
    color: #3a3a5a;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  header .status {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: #3a3a5a;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    display: inline-block;
  }
  .dot.online { background: #00ff88; box-shadow: 0 0 8px #00ff8866; animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .dot.offline { background: #ff4444; }

  #terminal {
    flex: 1;
    overflow-y: auto;
    padding: 16px 24px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    scroll-behavior: smooth;
  }
  #terminal::-webkit-scrollbar { width: 4px; }
  #terminal::-webkit-scrollbar-track { background: transparent; }
  #terminal::-webkit-scrollbar-thumb { background: #1a1a3e; border-radius: 2px; }

  .line {
    padding: 4px 0;
    line-height: 1.6;
    font-size: 13px;
    animation: fadeIn 0.2s ease;
    white-space: pre-wrap;
    word-break: break-word;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  .line.prompt-user::before {
    content: '❯ ';
    color: #00d4ff;
    font-weight: bold;
  }
  .line.prompt-neon::before {
    content: '◆ ';
    color: #7b2ff7;
  }
  .line.prompt-system {
    color: #3a3a5a;
    font-size: 11px;
    text-align: center;
    padding: 8px 0;
  }
  .line.prompt-system::before, .line.prompt-system::after {
    content: ' ─── ';
    color: #1a1a3e;
  }
  .line .highlight { color: #00d4ff; }
  .line .success { color: #00ff88; }
  .line .error { color: #ff4444; }
  .line .warning { color: #ffaa00; }

  #input-line {
    display: flex;
    align-items: center;
    padding: 8px 24px 12px;
    border-top: 1px solid #0e0e24;
    background: #060612;
    gap: 8px;
    flex-shrink: 0;
  }
  #input-line .prompt {
    color: #00d4ff;
    font-size: 14px;
    font-weight: bold;
  }
  #input {
    flex: 1;
    background: transparent;
    border: none;
    color: #e0e0ff;
    font-family: inherit;
    font-size: 13px;
    outline: none;
    caret-color: #00d4ff;
  }
  #input::placeholder { color: #2a2a4a; }

  .scanline {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,212,255,0.015) 2px, rgba(0,212,255,0.015) 4px);
    pointer-events: none;
    z-index: 999;
  }

  @media (max-width: 600px) {
    #terminal { padding: 12px; }
    #input-line { padding: 8px 12px 12px; }
  }
</style>
</head>
<body>
<div class="scanline"></div>

<header>
  <span class="logo">◆ NEON</span>
  <span class="sub">assistente pessoal</span>
  <div class="status">
    <span class="dot online" id="statusDot"></span>
    <span id="statusText">online</span>
  </div>
</header>

<div id="terminal">
  <div class="line prompt-system">Neon v1.0 — Sistema iniciado. Digite /help para comandos.</div>
  <div class="line prompt-system">Web UI rodando em localhost:3000</div>
</div>

<div id="input-line">
  <span class="prompt">❯</span>
  <input id="input" type="text" placeholder="digite sua mensagem..." autofocus spellcheck="false">
</div>

<script>
const term = document.getElementById('terminal');
const input = document.getElementById('input');
const API = '/api/ask';
let enviando = false;
let historico = [];
let histIdx = -1;

function log(tipo, texto) {
  const div = document.createElement('div');
  div.className = 'line ' + tipo;

  if (tipo === 'neon') {
    const html = texto
      .replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
        return `<span style="color:#3a3a5a">┌─ ${lang||'code'} ─────────────────────</span>\n<pre style="margin:0;padding:4px 0 4px 16px;color:#8888aa;font-size:12px;border-left:1px solid #1a1a3e">${code.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</pre>\n<span style="color:#3a3a5a">└─────────────────────────────</span>`;
      })
      .replace(/\*\*(.*?)\*\*/g, '<span class="highlight">$1</span>')
      .replace(/✅/g, '<span class="success">✅</span>')
      .replace(/❌/g, '<span class="error">❌</span>')
      .replace(/⚠️/g, '<span class="warning">⚠️</span>')
      .replace(/\n/g, '<br>');
    div.innerHTML = html;
  } else {
    div.textContent = texto;
  }

  term.appendChild(div);
  term.scrollTop = term.scrollHeight;
}

function typing(ativo) {
  let el = document.getElementById('typing');
  if (!ativo) { if (el) el.remove(); return; }
  if (el) return;
  const d = document.createElement('div');
  d.id = 'typing';
  d.className = 'line';
  d.style.color = '#3a3a5a';
  d.textContent = '◆ processando...';
  term.appendChild(d);
  term.scrollTop = term.scrollHeight;
}

async function enviar() {
  const msg = input.value.trim();
  if (!msg || enviando) return;
  input.value = '';
  enviando = true;

  historico.push(msg);
  histIdx = -1;

  log('prompt-user', msg);
  typing(true);

  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId: 'web_ui', username: 'Web', message: msg })
    });
    const data = await res.json();
    typing(false);
    if (data.reply) {
      log('neon', data.reply);
    } else if (data.error) {
      log('neon', '<span class="error">❌ ' + data.error + '</span>');
    } else {
      log('neon', '<span class="warning">⚠ resposta vazia</span>');
    }
  } catch (err) {
    typing(false);
    log('neon', '<span class="error">❌ erro de conexao: ' + err.message + '</span>');
  }
  enviando = false;
  input.focus();
}

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { e.preventDefault(); enviar(); return; }
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (historico.length === 0) return;
    histIdx = Math.min(histIdx + 1, historico.length - 1);
    input.value = historico[historico.length - 1 - histIdx];
    return;
  }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (histIdx <= 0) { histIdx = -1; input.value = ''; return; }
    histIdx--;
    input.value = historico[historico.length - 1 - histIdx];
    return;
  }
  if (e.key === 'l' && e.ctrlKey) {
    e.preventDefault();
    term.innerHTML = '';
    log('prompt-system', 'terminal limpo');
    return;
  }
});
</script>
</body>
</html>
