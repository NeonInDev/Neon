<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body>
<script>
let recognition = null;
let restartTimer = null;

function iniciar() {
  console.log('VOICE_PAGE: iniciando webkitSpeechRecognition...');
  if (!('webkitSpeechRecognition' in window)) {
    console.error('VOICE_PAGE: webkitSpeechRecognition nao disponivel');
    __neonSpeechReady2(false, 'webkitSpeechRecognition nao disponivel');
    return;
  }

  recognition = new webkitSpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'pt-BR';

  recognition.onstart = () => {
    console.log('VOICE_PAGE: recognition started');
    __neonSpeechReady2(true, 'ok');
  };

  recognition.onerror = (e) => {
    console.warn('VOICE_PAGE: recognition error', e.error);
    if (e.error === 'aborted') return;
    if (e.error === 'no-speech') return;
    __neonSpeechReady2(false, e.error);
    agendarRestart();
  };

  recognition.onend = () => {
    console.log('VOICE_PAGE: recognition ended, restarting...');
    agendarRestart();
  };

  recognition.onresult = (e) => {
    console.log('VOICE_PAGE: result received', e.resultIndex, e.results.length);
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const texto = e.results[i][0].transcript.trim();
      console.log('VOICE_PAGE: transcript', texto);
      if (texto) __neonSpeechCmd(texto);
    }
  };

  recognition.start();
  console.log('VOICE_PAGE: recognition.start() called');
}

function agendarRestart() {
  if (restartTimer) clearTimeout(restartTimer);
  restartTimer = setTimeout(() => {
    console.log('VOICE_PAGE: attempting restart...');
    try { recognition?.start(); } catch(e) { console.error('VOICE_PAGE: restart failed', e); }
  }, 1000);
}

window.__neonListening = true;
iniciar();
</script>
</body>
</html>
